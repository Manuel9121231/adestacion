<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estado de Equipos — Consulta</title>
  <link rel="icon" type="image/png" href="images/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #eef2f7;
      --card-bg: #ffffff;
      --text: #1e293b;
      --text-muted: #64748b;
      --accent: #3b82f6;
      --ok: #10b981;
      --err: #ef4444;
      --warn: #f59e0b;
      --inactive: #6b7280;
      --border: #cbd5e1;
      --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
    }

    body.dark-mode {
      --bg: #0f0f1a;
      --card-bg: #1a1a2e;
      --text: #ffffff;
      --text-muted: #94a3b8;
      --accent: #4f8ef7;
      --border: rgba(255,255,255,0.08);
      --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.4);
    }
    body.dark-mode .m-card          { background: #1e2a3a; border-color: #2d4a6e; }
    body.dark-mode .m-card.warn     { background: #2a2010; border-color: #78450a; }
    body.dark-mode .m-card.inactive { background: #1e1e1e; border-color: #3a3a3a; }
    body.dark-mode .m-card.down     { background: #2a1515; border-color: #7f1d1d; }
    body.dark-mode .badge-ok        { background: #052e16; color: #34d399; }
    body.dark-mode .badge-warn      { background: #2a1a00; color: #fbbf24; }
    body.dark-mode .badge-inactive  { background: #1f2937; color: #9ca3af; }
    body.dark-mode .badge-err       { background: #2a0a0a; color: #f87171; }
    body.dark-mode .m-details       { border-top-color: rgba(255,255,255,0.08); }
    body.dark-mode .sidebar-item    { background: #1a1a2e; border-color: rgba(255,255,255,0.08); }
    body.dark-mode .sidebar-item:hover { background: #1e2a3a; border-color: #4f8ef7; }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      padding-bottom: 40px;
      overflow-y: scroll;
    }
    body, body * { transition-duration: 0s !important; }

    /* ══ HEADER ═══════════════════════════════════════════ */
    header {
      background: var(--card-bg);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
    }
    .header-top {
      display: flex;
      align-items: center;
      gap: 16px;
      max-width: 1200px;
      margin: 0 auto 12px;
    }
    .back-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: 10px;
      color: var(--text);
      text-decoration: none;
      transition: all 0.2s;
      background: var(--bg);
      border: 1px solid var(--border);
    }
    .back-btn:hover { color: var(--accent); border-color: var(--accent); }
    .theme-toggle {
      margin-left: auto;
      padding: 7px 14px;
      font-size: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--card-bg);
      color: var(--text);
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      white-space: nowrap;
    }
    .theme-toggle:hover { border-color: var(--accent); color: var(--accent); }
    
    .tv-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: var(--bg);
      color: var(--text);
      text-decoration: none;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      transition: all 0.2s;
    }
    .tv-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-1px);
    }
    .tv-btn svg { width: 18px; height: 18px; }

    .header-title h1 { font-size: 18px; font-weight: 800; letter-spacing: -0.02em; color: var(--text); }
    .header-title p { font-size: 13px; color: var(--text-muted); }

    /* Buscador */
    .search-container {
      max-width: 1200px;
      margin: 0 auto;
      position: relative;
    }
    .search-input {
      width: 100%;
      padding: 12px 16px 12px 44px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--bg);
      font-size: 14px;
      outline: none;
      transition: all 0.2s;
      color: var(--text);
    }
    .search-input:focus {
      background: var(--card-bg);
      border-color: var(--accent);
    }
    .search-input::placeholder {
      color: var(--text-muted);
    }
    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      width: 20px;
      height: 20px;
    }

    /* ══ CONTENIDO ════════════════════════════════════════ */
    main {
      max-width: 1400px;
      margin: 24px auto;
      padding: 0 20px;
    }
    .layout {
      display: flex;
      gap: 24px;
      align-items: flex-start;
    }
    .sidebar {
      width: 200px;
      flex-shrink: 0;
      position: sticky;
      top: 140px;
      align-self: flex-start;
      max-height: calc(100vh - 160px);
      overflow-y: auto;
      padding-right: 8px;
      z-index: 50;
    }
    .sidebar-item {
      padding: 12px 16px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 4px;
      font-weight: 600;
      font-size: 14px;
      color: var(--text);
      background: var(--card-bg);
      border: 2px solid var(--border);
      box-shadow: var(--shadow);
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .sidebar-item:hover {
      background: #dbeafe;
      border-color: #60a5fa;
      transform: translateX(4px);
    }
    .sidebar-item:active {
      transform: scale(0.98);
    }
    .sidebar-item.active {
      background: #3b82f6;
      color: white;
      border-color: #2563eb;
    }
    .content {
      flex: 1;
      min-width: 0;
    }

    .sala-section { margin-bottom: 40px; }
    .sala-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 2px solid var(--border);
    }
    .sala-header h2 { font-size: 20px; font-weight: 800; color: var(--text); }
    .sala-badge {
      font-size: 12px;
      font-weight: 600;
      background: #3b82f6;
      padding: 4px 12px;
      border-radius: 20px;
      color: white;
    }
    .sala-badge-ratio {
      background: #3b82f6;
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    .machine-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    /* ══ TARJETA (CARD) ═══════════════════════════════════ */
    .m-card {
      background: #dbeafe;
      border: 1px solid #60a5fa;
      border-radius: 16px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative;
      box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.15);
    }
    .m-card.warn {
      background: #fffbeb;
      border-color: #fcd34d;
      box-shadow: 0 4px 6px -1px rgba(245, 158, 11, 0.15);
    }
    .m-card.inactive {
      background: #f3f4f6;
      border-color: #9ca3af;
      box-shadow: 0 4px 6px -1px rgba(107, 114, 128, 0.15);
      opacity: 0.85;
    }
    .m-card.down {
      background: #fee2e2;
      border-color: #f87171;
      box-shadow: 0 4px 6px -1px rgba(239, 68, 68, 0.15);
    }
    .m-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 12px -2px rgba(59, 130, 246, 0.25);
    }
    .m-card.warn:hover {
      box-shadow: 0 8px 12px -2px rgba(245, 158, 11, 0.25);
    }
    .m-card.inactive:hover {
      opacity: 1;
      box-shadow: 0 8px 12px -2px rgba(107, 114, 128, 0.25);
    }
    .m-card.down:hover {
      box-shadow: 0 8px 12px -2px rgba(239, 68, 68, 0.25);
    }
    
    .m-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .m-status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-top: 6px;
    }
    .status-ok       { background: var(--ok);       box-shadow: 0 0 8px var(--ok); }
    .status-warn     { background: var(--warn);     box-shadow: 0 0 8px var(--warn); }
    .status-inactive { background: var(--inactive); box-shadow: 0 0 6px var(--inactive); }
    .status-err      { background: var(--err);      box-shadow: 0 0 8px var(--err); }

    .m-info { flex: 1; padding: 0 10px; }
    .m-name { font-weight: 700; font-size: 16px; margin-bottom: 2px; }
    .m-type { font-size: 12px; color: var(--text-muted); font-weight: 500; }

    .m-badge {
      font-size: 11px;
      font-weight: 800;
      padding: 4px 8px;
      border-radius: 6px;
      text-transform: uppercase;
    }
    .badge-ok       { background: #ecfdf5; color: var(--ok); }
    .badge-warn      { background: #fffbeb; color: #b45309; }
    .badge-inactive  { background: #f3f4f6; color: #374151; }
    .badge-err       { background: #fef2f2; color: var(--err); }

    .m-details {
      padding-top: 12px;
      border-top: 1px solid #f1f5f9;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .m-nota { font-size: 12px; color: var(--text-muted); font-style: italic; }
    .m-estado-sub {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--ok);
      background: #ecfdf5;
      border-radius: 4px;
      padding: 1px 5px;
      margin-left: 4px;
      vertical-align: middle;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    #loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 100px 0;
      gap: 16px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #e2e8f0;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 600px) {
      .layout {
        flex-direction: column;
        gap: 16px;
      }
      .sidebar {
        position: static;
        width: 100%;
        max-height: none;
        padding-right: 0;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .sidebar-item {
        flex: 1;
        min-width: 120px;
        text-align: center;
        margin-bottom: 0;
      }
      .machine-grid { grid-template-columns: 1fr; }
      .header-title h1 { font-size: 16px; }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
</head>
<body>
<script src="js/theme.js"></script>

<header>
  <div class="header-top">
    <a href="index.html" class="back-btn">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
    </a>
    <div class="header-title">
      <h1>Estado de Equipos</h1>
      <p id="statsLabel">Cargando disponibilidad...</p>
    </div>
    <button class="theme-toggle" id="btnThemeToggle" onclick="toggleTheme()">🌙 Modo Oscuro</button>
    <a href="estado-tv.html" class="tv-btn" title="Modo Pantalla Completa (TV)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>
      <span>Modo TV</span>
    </a>
  </div>
  <div class="search-container">
    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
    <input type="text" id="searchInput" class="search-input" placeholder="Buscar por nombre, sala o etiqueta..." oninput="filterMachines()">
  </div>
</header>

<main id="mainContent">
  <div id="loader">
    <div class="spinner"></div>
    <p>Consultando base de datos...</p>
  </div>
  <div class="layout" id="layoutContainer" style="display:none">
    <aside class="sidebar" id="sidebarSalas"></aside>
    <div class="content" id="contentArea"></div>
  </div>
</main>

<script>
  let allData = {};
  let rawMachines = [];
  let scrollSpyEnabled = true;

  async function loadStatus() {
    try {
      if (!window.supabaseClient) { setTimeout(loadStatus, 500); return; }
      const c = window.supabaseClient;

      const [mRes, iRes] = await Promise.all([
        c.from('equipos').select('id,nombre,codigo,tipo,modelo,estado,notas,ultimo_mantenimiento,frecuencia_dias,salas(nombre)').order('nombre'),
        c.from('registros').select('maquina_id').eq('tipo','Incidencia').eq('resuelta',false)
      ]);

      if (mRes.error) throw mRes.error;
      const enRep = new Set((iRes.data||[]).map(i => i.maquina_id));
      
      let totOk = 0, totErr = 0;
      const bySala = {};
      rawMachines = [];

      (mRes.data||[]).forEach(m => {
        const sala = m.salas?.nombre || 'Sin sala';
        if (!bySala[sala]) bySala[sala] = [];

        const inactiva = (m.estado||'').toLowerCase().trim() !== 'activa';
        const incidencia = enRep.has(m.id);
        const down = inactiva || incidencia;

        // Build status text: always show operational status + incident if applicable
        let statusParts = [m.estado || 'Activa'];
        if (incidencia) statusParts.push('Incidencia');
        const motivo = statusParts.join(' + ');

        const entry = {
          id: m.id,
          nombre: m.nombre || 'Sin nombre',
          sala,
          tipo: m.tipo || '',
          notas: m.notas || '',
          estado: m.estado || 'Activa',
          down,
          motivo,
          inactiva,
          incidencia,
        };

        bySala[sala].push(entry);
        rawMachines.push(entry);
        if (down) totErr++; else totOk++;
      });

      allData = bySala;
      document.getElementById('statsLabel').textContent = `${totOk} disponibles · ${totErr} fuera de servicio`;
      renderData(bySala);

    } catch(e) {
      console.error(e);
      document.getElementById('mainContent').innerHTML = `<div class="empty-state">⚠ Error al conectar con el servidor. Reintenta recargando la página.</div>`;
    }
  }

  function renderData(data) {
    const loader = document.getElementById('loader');
    const layoutContainer = document.getElementById('layoutContainer');
    const sidebar = document.getElementById('sidebarSalas');
    const contentArea = document.getElementById('contentArea');

    const sortedSalas = Object.keys(data).sort();

    if (sortedSalas.length === 0) {
      loader.innerHTML = `<div class="empty-state">No se encontraron equipos.</div>`;
      return;
    }

    loader.style.display = 'none';
    layoutContainer.style.display = 'flex';

    // Render sidebar
    sidebar.innerHTML = sortedSalas.map(sala => {
      const count = data[sala].length;
      return `
        <div class="sidebar-item" data-sala="${sala.toLowerCase()}" onclick="scrollToSala('${sala.toLowerCase()}')">
          ${sala} <span style="font-size:12px;opacity:0.6;margin-left:auto">${count}</span>
        </div>
      `;
    }).join('');

    // Render content
    contentArea.innerHTML = sortedSalas.map(sala => {
      const machines = data[sala];
      return `
        <section class="sala-section" data-sala="${sala.toLowerCase()}" id="sala-${sala.toLowerCase()}">
          <div class="sala-header">
            <h2>${sala}</h2>
            <span class="sala-badge">${machines.length} equipos</span>
            <span class="sala-badge-ratio">${machines.filter(m => !m.down).length}/${machines.length} disponibles</span>
          </div>
          <div class="machine-grid">
            ${machines.map(m => machineHTML(m)).join('')}
          </div>
        </section>
      `;
    }).join('');

    // Setup scroll spy
    setupScrollSpy();
  }

  function scrollToSala(salaName) {
    // Disable scroll spy during manual click
    scrollSpyEnabled = false;

    // Set active class immediately for visual feedback
    const sidebarItems = document.querySelectorAll('.sidebar-item');
    sidebarItems.forEach(item => {
      item.classList.toggle('active', item.dataset.sala === salaName);
    });

    const section = document.getElementById(`sala-${salaName}`);
    if (section) {
      const yOffset = -160; // offset for header
      const y = section.getBoundingClientRect().top + window.pageYOffset + yOffset;
      window.scrollTo({ top: y, behavior: 'smooth' });

      // Re-enable scroll spy after scroll completes
      setTimeout(() => {
        scrollSpyEnabled = true;
      }, 800);
    } else {
      scrollSpyEnabled = true;
    }
  }

  // Scroll spy para resaltar sala activa
  function setupScrollSpy() {
    const sections = document.querySelectorAll('.sala-section');
    const sidebarItems = document.querySelectorAll('.sidebar-item');

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting && scrollSpyEnabled) {
          const salaName = entry.target.dataset.sala;
          sidebarItems.forEach(item => {
            item.classList.toggle('active', item.dataset.sala === salaName);
          });
        }
      });
    }, { threshold: 0.3, rootMargin: '-100px 0px -70% 0px' });

    sections.forEach(section => observer.observe(section));
  }

  function machineHTML(m) {
    let statusClass, badgeClass, cardClass, badgeText;

    if (!m.inactiva && !m.incidencia) {
      statusClass = 'status-ok';
      badgeClass  = 'badge-ok';
      badgeText   = 'Activa';
      cardClass   = 'm-card';
    } else if (!m.inactiva && m.incidencia) {
      statusClass = 'status-warn';
      badgeClass  = 'badge-warn';
      badgeText   = 'Activa';
      cardClass   = 'm-card warn';
    } else if (m.inactiva && !m.incidencia) {
      statusClass = 'status-inactive';
      badgeClass  = 'badge-inactive';
      badgeText   = m.motivo;
      cardClass   = 'm-card inactive';
    } else {
      statusClass = 'status-err';
      badgeClass  = 'badge-err';
      badgeText   = m.estado || 'Inactiva';
      cardClass   = 'm-card down';
    }

    let detailsHTML = '';
    if (m.incidencia) detailsHTML += `<span class="m-badge ${m.inactiva ? 'badge-err' : 'badge-warn'}" style="align-self:flex-start">Incidencia</span>`;
    if (m.notas) detailsHTML += `<span class="m-nota">${esc(m.notas)}</span>`;

    return `
      <div class="${cardClass}" data-nombre="${m.nombre.toLowerCase()}" data-badge="${badgeText.toLowerCase()}" data-tipo="${(m.tipo||'').toLowerCase()}">
        <div class="m-top">
          <div class="m-status-dot ${statusClass}"></div>
          <div class="m-info">
            <div class="m-name">${esc(m.nombre)}</div>
            <div class="m-type">${esc(m.tipo)}</div>
          </div>
          <span class="m-badge ${badgeClass}">${badgeText}</span>
        </div>
        ${detailsHTML ? `<div class="m-details">${detailsHTML}</div>` : ''}
      </div>
    `;
  }

  function fuzzyMatch(q, text) {
    const pattern = q.split('').map(c => c.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')).join('.*');
    return new RegExp(pattern, 'i').test(text);
  }

  function filterMachines() {
    const q = document.getElementById('searchInput').value.toLowerCase().trim();
    const sections = document.querySelectorAll('.sala-section');

    sections.forEach(sec => {
      const cards = sec.querySelectorAll('.m-card');
      let hasVisible = false;

      cards.forEach(card => {
        if (!q) {
          card.style.display = 'flex';
          hasVisible = true;
          return;
        }
        const fields = [card.dataset.nombre||'', card.dataset.tipo||'', card.dataset.badge||'', sec.dataset.sala||''];
        const visible = fields.some(f => fuzzyMatch(q, f));
        card.style.display = visible ? 'flex' : 'none';
        if (visible) hasVisible = true;
      });

      sec.style.display = hasVisible ? 'block' : 'none';
    });
  }

  function esc(s) {
    const d = document.createElement('div'); d.textContent = String(s||''); return d.innerHTML;
  }

  document.addEventListener('DOMContentLoaded', loadStatus);
</script>
<script src="js/theme.js"></script>
</body>
</html>
