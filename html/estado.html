<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estado de Equipos — Consulta</title>
  <link rel="icon" type="image/png" href="../images/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --text: #1e293b;
      --text-muted: #64748b;
      --accent: #3b82f6;
      --ok: #10b981;
      --err: #ef4444;
      --border: #e2e8f0;
      --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      padding-bottom: 40px;
    }

    /* ══ HEADER ═══════════════════════════════════════════ */
    header {
      background: var(--card-bg);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
    }
    .header-top {
      display: flex;
      align-items: center;
      gap: 16px;
      max-width: 1200px;
      margin: 0 auto 12px;
    }
    .back-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: 10px;
      color: var(--text-muted);
      text-decoration: none;
      transition: all 0.2s;
      background: var(--bg);
    }
    .back-btn:hover { color: var(--accent); background: #f1f5f9; }
    
    .tv-btn {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: #f1f5f9;
      color: var(--text-muted);
      text-decoration: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      transition: all 0.2s;
    }
    .tv-btn:hover {
      background: var(--accent);
      color: #fff;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.2);
    }
    .tv-btn svg { width: 18px; height: 18px; }

    .header-title h1 { font-size: 18px; font-weight: 800; letter-spacing: -0.02em; }
    .header-title p { font-size: 13px; color: var(--text-muted); }

    /* Buscador */
    .search-container {
      max-width: 1200px;
      margin: 0 auto;
      position: relative;
    }
    .search-input {
      width: 100%;
      padding: 12px 16px 12px 44px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--bg);
      font-size: 14px;
      outline: none;
      transition: all 0.2s;
    }
    .search-input:focus {
      background: #fff;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }
    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      width: 20px;
      height: 20px;
    }

    /* ══ CONTENIDO ════════════════════════════════════════ */
    main {
      max-width: 1200px;
      margin: 24px auto;
      padding: 0 20px;
    }

    .sala-section { margin-bottom: 40px; }
    .sala-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 2px solid var(--border);
    }
    .sala-header h2 { font-size: 20px; font-weight: 800; color: var(--text); }
    .sala-badge {
      font-size: 12px;
      font-weight: 600;
      background: #e2e8f0;
      padding: 2px 10px;
      border-radius: 20px;
      color: var(--text-muted);
    }

    .machine-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    /* ══ TARJETA (CARD) ═══════════════════════════════════ */
    .m-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative;
    }
    .m-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }
    
    .m-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .m-status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-top: 6px;
    }
    .status-ok  { background: var(--ok); box-shadow: 0 0 8px var(--ok); }
    .status-err { background: var(--err); box-shadow: 0 0 8px var(--err); }

    .m-info { flex: 1; padding: 0 10px; }
    .m-name { font-weight: 700; font-size: 16px; margin-bottom: 2px; }
    .m-type { font-size: 12px; color: var(--text-muted); font-weight: 500; }

    .m-badge {
      font-size: 11px;
      font-weight: 800;
      padding: 4px 8px;
      border-radius: 6px;
      text-transform: uppercase;
    }
    .badge-ok  { background: #ecfdf5; color: var(--ok); }
    .badge-err { background: #fef2f2; color: var(--err); }

    .m-details {
      padding-top: 12px;
      border-top: 1px solid #f1f5f9;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .m-nota { font-size: 12px; color: var(--text-muted); font-style: italic; }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    #loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 100px 0;
      gap: 16px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #e2e8f0;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 600px) {
      .machine-grid { grid-template-columns: 1fr; }
      .header-title h1 { font-size: 16px; }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-config.js"></script>
</head>
<body>

<header>
  <div class="header-top">
    <a href="index.html" class="back-btn">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
    </a>
    <div class="header-title">
      <h1>Estado de Equipos</h1>
      <p id="statsLabel">Cargando disponibilidad...</p>
    </div>
    <a href="estado-tv.html" class="tv-btn" title="Modo Pantalla Completa (TV)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>
      <span>Modo TV</span>
    </a>
  </div>
  <div class="search-container">
    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
    <input type="text" id="searchInput" class="search-input" placeholder="Buscar por nombre, sala o etiqueta..." oninput="filterMachines()">
  </div>
</header>

<main id="mainContent">
  <div id="loader">
    <div class="spinner"></div>
    <p>Consultando base de datos...</p>
  </div>
</main>

<script>
  let allData = {};
  let rawMachines = [];

  async function loadStatus() {
    try {
      if (!window.supabaseClient) { setTimeout(loadStatus, 500); return; }
      const c = window.supabaseClient;

      const [mRes, iRes] = await Promise.all([
        c.from('equipos').select('id,nombre,codigo,tipo,modelo,estado,notas,ultimo_mantenimiento,frecuencia_dias,salas(nombre)').order('nombre'),
        c.from('registros').select('maquina_id').eq('tipo','Incidencia').eq('resuelta',false)
      ]);

      if (mRes.error) throw mRes.error;
      const enRep = new Set((iRes.data||[]).map(i => i.maquina_id));
      
      let totOk = 0, totErr = 0;
      const bySala = {};
      rawMachines = [];

      (mRes.data||[]).forEach(m => {
        const sala = m.salas?.nombre || 'Sin sala';
        if (!bySala[sala]) bySala[sala] = [];
        
        const inactiva = (m.estado||'').toLowerCase().trim() !== 'activa';
        const incidencia = enRep.has(m.id);
        const down = inactiva || incidencia;
        const motivo = incidencia ? 'Incidencia' : (m.estado || 'Inactiva');
        
        const entry = {
          id: m.id,
          nombre: m.nombre || 'Sin nombre',
          sala,
          tipo: m.tipo || '',
          notas: m.notas || '',
          down,
          motivo,
        };
        
        bySala[sala].push(entry);
        rawMachines.push(entry);
        if (down) totErr++; else totOk++;
      });

      allData = bySala;
      document.getElementById('statsLabel').textContent = `${totOk} disponibles · ${totErr} fuera de servicio`;
      renderData(bySala);

    } catch(e) {
      console.error(e);
      document.getElementById('mainContent').innerHTML = `<div class="empty-state">⚠ Error al conectar con el servidor. Reintenta recargando la página.</div>`;
    }
  }

  function renderData(data) {
    const container = document.getElementById('mainContent');
    const sortedSalas = Object.keys(data).sort();
    
    if (sortedSalas.length === 0) {
      container.innerHTML = `<div class="empty-state">No se encontraron equipos.</div>`;
      return;
    }

    container.innerHTML = sortedSalas.map(sala => {
      const machines = data[sala];
      return `
        <section class="sala-section" data-sala="${sala.toLowerCase()}">
          <div class="sala-header">
            <h2>${sala}</h2>
            <span class="sala-badge">${machines.length} equipos</span>
          </div>
          <div class="machine-grid">
            ${machines.map(m => machineHTML(m)).join('')}
          </div>
        </section>
      `;
    }).join('');
  }

  function machineHTML(m) {
    const statusClass = m.down ? 'status-err' : 'status-ok';
    const badgeClass = m.down ? 'badge-err' : 'badge-ok';
    const badgeText = m.down ? m.motivo : 'Disponible';
    
    let detailsHTML = '';
    if (m.notas) detailsHTML += `<span class="m-nota">${esc(m.notas)}</span>`;

    return `
      <div class="m-card" data-nombre="${m.nombre.toLowerCase()}" data-badge="${badgeText.toLowerCase()}">
        <div class="m-top">
          <div class="m-status-dot ${statusClass}"></div>
          <div class="m-info">
            <div class="m-name">${esc(m.nombre)}</div>
            <div class="m-type">${esc(m.tipo)}</div>
          </div>
          <span class="m-badge ${badgeClass}">${badgeText}</span>
        </div>
        ${detailsHTML ? `<div class="m-details">${detailsHTML}</div>` : ''}
      </div>
    `;
  }

  function filterMachines() {
    const query = document.getElementById('searchInput').value.toLowerCase().trim();
    const sections = document.querySelectorAll('.sala-section');
    
    sections.forEach(sec => {
      const salaName = sec.dataset.sala;
      const cards = sec.querySelectorAll('.m-card');
      let hasVisible = false;

      cards.forEach(card => {
        const machineName = card.dataset.nombre;
        const badgeText = card.dataset.badge;
        const visible = machineName.includes(query) || salaName.includes(query) || badgeText.includes(query);
        card.style.display = visible ? 'flex' : 'none';
        if (visible) hasVisible = true;
      });

      sec.style.display = hasVisible ? 'block' : 'none';
    });
  }

  function esc(s) {
    const d = document.createElement('div'); d.textContent = String(s||''); return d.innerHTML;
  }

  document.addEventListener('DOMContentLoaded', loadStatus);
</script>
</body>
</html>
