<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Seleccionar Equipo — Estación</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="css/mobile.css">
  <script src="js/theme.js"></script>
  <style>
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      margin: 0; padding: 20px;
      padding-top: 80px;
      transition: background 0.3s, color 0.3s;
    }

    /* User Info Panel */
    .user-panel {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: #ffffff;
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 1000;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .user-name {
      font-weight: 600;
      font-size: 14px;
    }

    .user-role {
      font-size: 12px;
      color: var(--text-muted);
      background: var(--bg);
      padding: 4px 10px;
      border-radius: 12px;
    }

    .user-actions {
      display: flex;
      gap: 8px;
    }

    .user-btn {
      padding: 6px 12px;
      font-size: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #ffffff;
      color: var(--text);
      cursor: pointer;
      transition: all 0.2s;
    }

    .user-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .user-btn.logout {
      color: #ef4444;
      border-color: rgba(239, 68, 68, 0.3);
    }

    .user-btn.logout:hover {
      background: rgba(239, 68, 68, 0.1);
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      padding-top: 20px;
    }
    .header {
      margin-bottom: 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h1 {
      font-size: 24px;
      font-weight: 800;
      margin: 0;
    }
    .sala-section { margin-bottom: 32px; }
    .sala-title {
      font-size: 14px;
      font-weight: 800;
      color: var(--text-muted);
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid var(--border);
      padding-bottom: 8px;
    }
    .sala-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }
    @media (min-width: 600px) {
      .sala-grid { grid-template-columns: repeat(2, 1fr); }
    }
    .machine-card {
      background: var(--card);
      border-radius: 16px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 16px;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s, background 0.3s;
    }
    .machine-card:active {
      transform: scale(0.98);
      border-color: var(--accent);
    }
    .machine-icon { font-size: 28px; flex-shrink: 0; display: block; }
    .machine-info { flex: 1; text-align: left; }
    .machine-name { font-weight: 700; font-size: 15px; margin-bottom: 2px; }
    .machine-code { font-size: 11px; color: var(--accent); font-weight: 800; }
    .machine-arrow { opacity: 0.3; font-weight: bold; font-size: 16px; transition: opacity 0.2s; }
    .machine-card:hover .machine-arrow { opacity: 1; color: var(--accent); }
    .loader { text-align: center; padding: 60px; opacity: 0.6; }
    .btn-back {
      background: var(--bg2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 16px;
      border-radius: 12px;
      text-decoration: none;
      font-size: 13px;
      transition: all 0.2s;
    }
    .btn-back:hover { background: var(--border); }

    .status-badge {
      font-size: 9px;
      padding: 2px 6px;
      border-radius: 6px;
      font-weight: 800;
      text-transform: uppercase;
      display: inline-block;
      margin-top: 4px;
    }
    .status-activa { background: rgba(16, 185, 129, 0.15); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.3); }
    .status-inactiva { background: rgba(107, 114, 128, 0.15); color: #6b7280; border: 1px solid rgba(107, 114, 128, 0.3); }
    .status-revision { background: rgba(245, 158, 11, 0.15); color: #f59e0b; border: 1px solid rgba(245, 158, 11, 0.3); }
    .status-averiada { background: rgba(239, 68, 68, 0.15); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
</head>
<body>

  <!-- User Info Panel -->
  <div class="user-panel" id="userPanel">
    <div class="user-info">
      <div class="user-name" id="userName">Cuenta sin iniciar</div>
      <div class="user-role" id="userRole">Sin sesión</div>
    </div>
    <div class="user-actions">
      <button class="user-btn" id="btnChangeAccount" onclick="window.location.href='registro.html'" style="display:none">Cambiar cuenta</button>
      <button class="user-btn logout" id="btnLogout" onclick="cerrarSesion()" style="display:none">Cerrar sesión</button>
    </div>
  </div>

  <div class="container">
    <div class="header">
      <h1>Portal Operario</h1>
      <a href="index.html" class="btn-back">← Volver</a>
    </div>

    <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 30px;">
      Selecciona la máquina que deseas reportar:
    </p>

    <div id="loading" class="loader">
      <p>Cargando equipos...</p>
    </div>

    <div class="machine-grid" id="machineGrid"></div>
  </div>

  <script>
    // Update user panel
    function updateUserPanel() {
      try {
        const sessionStr = localStorage.getItem('sgi_user_session');
        const userNameEl = document.getElementById('userName');
        const userRoleEl = document.getElementById('userRole');
        const btnChangeAccount = document.getElementById('btnChangeAccount');
        const btnLogout = document.getElementById('btnLogout');

        if (!sessionStr) {
          userNameEl.textContent = 'Cuenta sin iniciar';
          userRoleEl.textContent = 'Sin sesión';
          btnChangeAccount.style.display = 'none';
          btnLogout.style.display = 'none';
          return;
        }

        const session = JSON.parse(sessionStr);
        const rol = session.rol || 'usuario';
        const nombre = session.nombre || session.email || 'Usuario';

        userNameEl.textContent = nombre;
        const roleLabels = {
          'usuario': 'Usuario',
          'tecnico': 'Técnico',
          'admin': 'Administrador'
        };
        userRoleEl.textContent = roleLabels[rol] || rol;
        btnChangeAccount.style.display = 'block';
        btnLogout.style.display = 'block';
      } catch (err) {
        console.error('Error updating user panel:', err);
      }
    }

    // Cerrar sesión
    function cerrarSesion() {
      localStorage.removeItem('sgi_user_session');
      localStorage.removeItem('sgi_admin_session');
      window.location.href = 'index.html';
    }

    document.addEventListener('DOMContentLoaded', async () => {
      updateUserPanel();

      // Reintento autónomo si el cliente no está listo
      if (!window.supabaseClient) {
        setTimeout(() => location.reload(), 500);
        return;
      }

      const client = window.supabaseClient;

      try {
        const { data, error } = await client
          .from('equipos')
          .select('*, salas(nombre)')
          .order('nombre', { ascending: true });

        if (error) throw error;

        const gridContainer = document.getElementById('machineGrid');
        document.getElementById('loading').style.display = 'none';

        // Agrupar por sala
        const bySala = {};
        data.forEach(m => {
          const salaName = m.salas?.nombre || 'Sin Sala';
          if (!bySala[salaName]) bySala[salaName] = [];
          bySala[salaName].push(m);
        });

        // Generar secciones por sala
        Object.keys(bySala).sort().forEach(salaName => {
          const section = document.createElement('div');
          section.className = 'sala-section';
          section.innerHTML = `<div class="sala-title">${salaName}</div><div class="sala-grid"></div>`;
          const salaGrid = section.querySelector('.sala-grid');

          bySala[salaName].forEach(m => {
            const card = document.createElement('div');
            const statusClass = `status-${m.estado || 'activa'}`;
            const statusLabel = (m.estado || 'activa').replace('_', ' ');
            
            card.className = `machine-card`;
            card.onclick = () => window.location.href = `operario.html?maquinaId=${m.id}`;
            
            card.innerHTML = `
              <span class="machine-icon">🖨️</span>
              <div class="machine-info">
                <div class="machine-name">${m.nombre}</div>
                <div style="display: flex; align-items: center; gap: 8px;">
                  <div class="machine-code">${m.codigo || 'S/ID'}</div>
                  <div class="status-badge ${statusClass}">${statusLabel}</div>
                </div>
              </div>
              <span class="machine-arrow">→</span>
            `;
            salaGrid.appendChild(card);
          });
          
          gridContainer.appendChild(section);
        });

      } catch (err) {
        document.getElementById('loading').innerHTML = '<p style="color:red">Error de conexión</p>';
        console.error(err);
      }
    });
  </script>
</body>
</html>
