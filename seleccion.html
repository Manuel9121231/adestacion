<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Seleccionar Equipo — Estación</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="css/mobile.css">
  <style>
    :root {
      --bg: #0f0f1a;
      --card-bg: #1a1a2e;
      --text: #ffffff;
      --text-muted: #94a3b8;
      --accent: #4f8ef7;
      --border: rgba(255, 255, 255, 0.08);
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      margin: 0; padding: 20px;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      padding-top: 20px;
    }
    .header {
      margin-bottom: 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h1 {
      font-size: 24px;
      font-weight: 800;
      margin: 0;
    }
    .sala-section { margin-bottom: 32px; }
    .sala-title {
      font-size: 14px;
      font-weight: 800;
      color: var(--text-muted);
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid var(--border);
      padding-bottom: 8px;
    }
    .sala-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }
    @media (min-width: 600px) {
      .sala-grid { grid-template-columns: repeat(2, 1fr); }
    }
    .machine-card {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 16px;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    }
    .machine-card:active {
      transform: scale(0.98);
      border-color: var(--accent);
    }
    .machine-icon { font-size: 28px; flex-shrink: 0; display: block; }
    .machine-info { flex: 1; text-align: left; }
    .machine-name { font-weight: 700; font-size: 15px; margin-bottom: 2px; }
    .machine-code { font-size: 11px; color: var(--accent); font-weight: 800; }
    .machine-arrow { opacity: 0.3; font-weight: bold; font-size: 16px; transition: opacity 0.2s; }
    .machine-card:hover .machine-arrow { opacity: 1; color: var(--accent); }
    .loader { text-align: center; padding: 60px; opacity: 0.6; }
    .btn-back {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      color: white;
      padding: 8px 16px;
      border-radius: 12px;
      text-decoration: none;
      font-size: 13px;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
</head>
<body>

  <div class="container">
    <div class="header">
      <h1>Portal Operario</h1>
      <a href="index.html" class="btn-back">← Volver</a>
    </div>

    <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 30px;">
      Selecciona la máquina que deseas reportar:
    </p>

    <div id="loading" class="loader">
      <p>Cargando equipos...</p>
    </div>

    <div class="machine-grid" id="machineGrid"></div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      // Reintento autónomo si el cliente no está listo
      if (!window.supabaseClient) {
        setTimeout(() => location.reload(), 500);
        return;
      }

      const client = window.supabaseClient;

      try {
        const { data, error } = await client
          .from('equipos')
          .select('*, salas(nombre)')
          .eq('estado', 'activa')
          .order('nombre', { ascending: true });

        if (error) throw error;

        const gridContainer = document.getElementById('machineGrid');
        document.getElementById('loading').style.display = 'none';

        // Agrupar por sala
        const bySala = {};
        data.forEach(m => {
          const salaName = m.salas?.nombre || 'Sin Sala';
          if (!bySala[salaName]) bySala[salaName] = [];
          bySala[salaName].push(m);
        });

        // Generar secciones por sala
        Object.keys(bySala).sort().forEach(salaName => {
          const section = document.createElement('div');
          section.className = 'sala-section';
          section.innerHTML = `<div class="sala-title">${salaName}</div><div class="sala-grid"></div>`;
          const salaGrid = section.querySelector('.sala-grid');

          bySala[salaName].forEach(m => {
            const card = document.createElement('div');
            card.className = 'machine-card';
            card.onclick = () => window.location.href = `operario.html?maquinaId=${m.id}`;
            
            card.innerHTML = `
              <span class="machine-icon">🖨️</span>
              <div class="machine-info">
                <div class="machine-name">${m.nombre}</div>
                <div class="machine-code">${m.codigo || 'S/ID'}</div>
              </div>
              <span class="machine-arrow">→</span>
            `;
            salaGrid.appendChild(card);
          });
          
          gridContainer.appendChild(section);
        });

      } catch (err) {
        document.getElementById('loading').innerHTML = '<p style="color:red">Error de conexión</p>';
        console.error(err);
      }
    });
  </script>
</body>
</html>
