<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin – Gestor de máquinas</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <meta name="description" content="Sistema de gestión de mantenimiento preventivo para impresoras y máquinas 3D">
  <link rel="stylesheet" href="css/main.css?v=4.0">
  <!-- Supabase, QR SDK & Driver.js (Tour) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/driver.js@1.0.1/dist/driver.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/driver.js@1.0.1/dist/driver.js.iife.js"></script>
  <script src="js/supabase-config.js?v=4.0"></script>
  <script src="js/theme.js"></script>
  <script src="js/dashboard-ui.js?v=4.0"></script>
  <script src="js/admin.js?v=4.0"></script>
  <script>
    // ── Guard de Seguridad Instantáneo ──
    (function() {
      const session = localStorage.getItem('sgi_admin_session');
      if (!session) {
        document.documentElement.classList.add('auth-locked');
      }
    })();
  </script>
  <style>
    .auth-locked #dashboardContent { display: none !important; }
    .auth-locked .admin-login-overlay { display: flex !important; opacity: 1 !important; visibility: visible !important; }

    .admin-login-overlay {
      display: none;
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at 60% 40%, #1a1a3e 0%, #0f0f1a 70%);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      padding: 20px;
      font-family: 'Inter', system-ui, sans-serif;
    }
    .login-card {
      background: rgba(26,26,46,0.98);
      border: 1px solid rgba(79,142,247,0.3);
      border-radius: 24px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      text-align: center;
      backdrop-filter: blur(20px);
      box-shadow: 0 40px 80px rgba(0,0,0,0.6), 0 0 60px rgba(79,142,247,0.08);
    }
    .login-icon { font-size: 52px; display: block; margin-bottom: 20px; }
    .login-card h2 { font-size: 24px; font-weight: 800; color: #fff; margin-bottom: 8px; }
    .login-card > p { color: #94a3b8; font-size: 14px; margin-bottom: 32px; }
    .login-field {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 14px 16px;
      color: #fff;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      margin-bottom: 12px;
      box-sizing: border-box;
      font-family: 'Inter', system-ui, sans-serif;
    }
    .login-field:focus { border-color: #4f8ef7; box-shadow: 0 0 0 3px rgba(79,142,247,0.15); }
    .login-field::placeholder { color: #64748b; }
    .btn-login {
      width: 100%;
      background: linear-gradient(135deg, #4f8ef7, #7c3aed);
      border: none;
      border-radius: 12px;
      padding: 15px;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
      margin-top: 8px;
      font-family: 'Inter', system-ui, sans-serif;
    }
    .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(79,142,247,0.4); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .login-error { color: #ef4444; font-size: 13px; margin-top: 14px; min-height: 20px; }
    .login-link { margin-top: 24px; font-size: 13px; color: #64748b; }
    .login-link a { color: #4f8ef7; text-decoration: none; font-weight: 600; }
    .login-link a:hover { text-decoration: underline; }
    @keyframes shake {
      0%,100%{transform:translateX(0)}
      20%,60%{transform:translateX(-8px)}
      40%,80%{transform:translateX(8px)}
    }
    .shake { animation: shake 0.4s ease; }
  </style>
</head>

<body>
  
  <!-- ── Admin Login Overlay ── -->
  <div class="admin-login-overlay" id="adminLoginOverlay">
    <div class="login-card" id="loginCard">
      <span class="login-icon">🔐</span>
      <h2>Acceso Administración</h2>
      <p>Introduce tus credenciales de administrador para continuar</p>
      <input type="text" id="adminUsernameInput" class="login-field"
        placeholder="Usuario o email" autocomplete="username">
      <input type="password" id="adminPinInput" class="login-field"
        placeholder="Contraseña" autocomplete="current-password"
        onkeydown="if(event.key==='Enter') intentarLogin()">
      <button class="btn-login" id="btnLoginAdmin" onclick="intentarLogin()">🔓 Entrar al Panel</button>
      <div id="loginError" class="login-error"></div>
      <div class="login-link">
        ¿Eres técnico o usuario? <a href="registro.html">Portal de usuarios →</a>
      </div>
    </div>
  </div>

  <!-- El contenido se inyecta dinámicamente aquí por seguridad -->
  <div id="dashboardContent"></div>

</body>

</html>
